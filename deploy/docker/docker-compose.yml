# Local-only "kick the tires" compose for Portunus.
#
# It builds the runtime images from a local checkout, runs a control-plane
# server (operator API + Web UI on http://127.0.0.1:7080), and can attach a
# self-enrolling edge client. This is for development and release verification,
# not the recommended install path — see docs/deployment/docker for that.
#
# Client enrollment and rule push changed in v2.0 (015-client-stable-id) and
# v1.6.1, so the operator subcommands differ by transport:
#   - enroll-client / revoke / rename-client are OFFLINE (they open state.db):
#     they only run with the server stopped, and NOT via the `operator` service
#     here — it shares the server's network namespace, which is gone when the
#     server is down. Enroll from the Web UI Clients page instead (step 5).
#   - list-clients / push-rule / list-rules / rule-stats are HTTP calls to the
#     running server's operator API: they need `PORTUNUS_OPERATOR_TOKEN` and
#     address clients by their stable id (ULID), not their display name.
#
# Usage:
#   1. Stage prebuilt Linux binaries for the runtime-only Dockerfiles:
#        ./deploy/docker/prepare-build-context.sh
#   2. Build:    docker compose -f deploy/docker/docker-compose.yml build
#   3. Start:    docker compose -f deploy/docker/docker-compose.yml up -d server
#   4. Onboard + mint a token: open http://127.0.0.1:7080, paste the setup token
#        from `docker compose logs server | grep 'onboarding setup token'`, create
#        the first superadmin, then mint an operator API token on the Credentials
#        page and export it for the HTTP commands below:
#          export PORTUNUS_OPERATOR_TOKEN=<token>
#   5. Enroll a client in the Web UI Clients page, copy the one-time enroll URI,
#      then start the self-enrolling client (it writes its bundle on first boot):
#        PORTUNUS_ENROLL_URI='portunus://…' \
#          docker compose -f deploy/docker/docker-compose.yml --profile client up -d client
#   6. Find the client's id (HTTP; reads PORTUNUS_OPERATOR_TOKEN from the env):
#        docker compose -f deploy/docker/docker-compose.yml \
#          run --rm -e PORTUNUS_OPERATOR_TOKEN operator \
#          --data-dir /var/lib/portunus list-clients
#   7. Push a rule (8080 → echo:9000) addressed by that id:
#        docker compose -f deploy/docker/docker-compose.yml \
#          run --rm -e PORTUNUS_OPERATOR_TOKEN operator \
#          --data-dir /var/lib/portunus push-rule <client-id> 8080 echo:9000
#   8. Drive traffic from inside the network:
#        docker run --rm --network container:portunus-client alpine:3.20 \
#          sh -c 'apk add --no-cache netcat-openbsd >/dev/null && echo hello | nc -q1 127.0.0.1 8080'
#
# Notes:
# - Operator HTTP (7080) and metrics (7081) are loopback-only by design.
#   To inspect /metrics from the host: `docker compose exec server` won't
#   work (distroless has no shell), so use `docker run --rm --network
#   container:portunus-server curlimages/curl -s 127.0.0.1:7081/metrics`.
# - This compose is for local exploration only. For production use the
#   systemd units in deploy/systemd/ or roll the images into your
#   orchestrator with a real secret management story.

services:
  server:
    container_name: portunus-server
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.server
    image: portunus/server:dev
    ports:
      - "7443:7443"
      - "127.0.0.1:7080:7080"
    volumes:
      - server-data:/var/lib/portunus
    command: ["--data-dir", "/var/lib/portunus", "serve", "--operator-http-listen", "0.0.0.0:7080"]
    restart: unless-stopped

  # One-shot operator: same image, override the entrypoint command via
  # `docker compose run --rm operator <subcommand>`. It shares the server's
  # network namespace, so HTTP operator subcommands (list-clients, push-rule,
  # list-rules, rule-stats) reach the operator API at 127.0.0.1:7080 — pass the
  # bearer token with `-e PORTUNUS_OPERATOR_TOKEN`. Offline subcommands
  # (enroll-client, revoke, rename-client) cannot run here: they need the
  # server (and thus this shared netns) stopped; enroll from the Web UI.
  operator:
    profiles: ["cli"]
    image: portunus/server:dev
    volumes:
      - server-data:/var/lib/portunus
    network_mode: "service:server"
    entrypoint: ["/usr/local/bin/portunus-server"]
    command: ["--help"]

  client:
    profiles: ["client"]
    container_name: portunus-client
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.client
    image: portunus/client:dev
    # First boot self-enrolls from PORTUNUS_ENROLL_URI and writes the bundle
    # into the client-data volume; later boots reuse the bundle and ignore the
    # URI. Sharing the server's network namespace lets the client dial the
    # advertised loopback endpoint (127.0.0.1:7443) of this dev server.
    environment:
      PORTUNUS_ENROLL_URI: "${PORTUNUS_ENROLL_URI:-}"
    network_mode: "service:server"
    volumes:
      - client-data:/etc/portunus
    restart: unless-stopped

  # Echo target: any TCP that gets bytes echoes them back. Used by the
  # quickstart push-rule example so you can curl/`nc` through a real rule
  # without depending on outbound internet.
  echo:
    container_name: portunus-echo
    image: alpine:3.20
    command: ["sh", "-c", "apk add --no-cache socat && socat TCP-LISTEN:9000,fork,reuseaddr EXEC:cat"]
    expose:
      - "9000"
    restart: unless-stopped

volumes:
  server-data:
  client-data:
