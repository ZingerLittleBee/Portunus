# Local-only "kick the tires" compose for Portunus.
#
# Usage:
#   1. Build the binaries and stage them for the runtime-only Dockerfiles:
#        ./deploy/docker/prepare-build-context.sh
#   2. Build:    docker compose -f deploy/docker/docker-compose.yml build
#   3. Start:    docker compose -f deploy/docker/docker-compose.yml up -d server
#   4. Provision a client (writes bundle into shared volume):
#        docker compose -f deploy/docker/docker-compose.yml \
#          run --rm operator provision-client edge-01 \
#          --out /shared/edge-01.bundle.json
#      Then copy /shared/edge-01.bundle.json out of the server volume to give
#      to the client (or mount the same volume into the client container).
#   5. Start the client:
#        docker compose -f deploy/docker/docker-compose.yml \
#          --profile client up -d client
#   6. Push a rule (8080 → echo:9000):
#        docker compose -f deploy/docker/docker-compose.yml \
#          run --rm operator push-rule edge-01 8080 echo 9000
#   7. Drive traffic from inside the network:
#        docker run --rm --network container:portunus-client alpine:3.20 \
#          sh -c 'apk add --no-cache netcat-openbsd >/dev/null && echo hello | nc -q1 127.0.0.1 8080'
#
# Notes:
# - Operator HTTP (7080) and metrics (7081) are loopback-only by design.
#   To inspect /metrics from the host: `docker compose exec server` won't
#   work (distroless has no shell), so use `docker run --rm --network
#   container:portunus-server-1 curlimages/curl -s 127.0.0.1:7081/metrics`.
# - This compose is for local exploration only. For production use the
#   systemd units in deploy/systemd/ or roll the images into your
#   orchestrator with a real secret management story.

services:
  server:
    container_name: portunus-server
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.server
    image: portunus/server:dev
    ports:
      - "7443:7443"
      - "127.0.0.1:7080:7080"
    volumes:
      - server-data:/var/lib/portunus
      - shared-bundles:/shared
    command: ["--data-dir", "/var/lib/portunus", "serve", "--operator-http-listen", "0.0.0.0:7080"]
    restart: unless-stopped

  # One-shot operator: same image, override the entrypoint command.
  # `docker compose run --rm operator <subcommand>` runs against the same
  # data volume as the server.
  operator:
    profiles: ["cli"]
    image: portunus/server:dev
    volumes:
      - server-data:/var/lib/portunus
      - shared-bundles:/shared
    network_mode: "service:server"
    entrypoint: ["/usr/local/bin/portunus-server"]
    command: ["--data-dir", "/var/lib/portunus", "list-clients"]

  client:
    profiles: ["client"]
    container_name: portunus-client
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.client
    image: portunus/client:dev
    volumes:
      - shared-bundles:/shared:ro
    command: ["--bundle", "/shared/edge-01.bundle.json"]
    restart: unless-stopped

  # Echo target: any TCP that gets bytes echoes them back. Used by the
  # quickstart push-rule example so you can curl/`nc` through a real rule
  # without depending on outbound internet.
  echo:
    container_name: portunus-echo
    image: alpine:3.20
    command: ["sh", "-c", "apk add --no-cache socat && socat TCP-LISTEN:9000,fork,reuseaddr EXEC:cat"]
    expose:
      - "9000"
    restart: unless-stopped

volumes:
  server-data:
  shared-bundles:
