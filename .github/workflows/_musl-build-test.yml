name: musl build test (temporary)

# Temporary workflow to validate the gnu->musl release switch with the
# standard NATIVE musl-tools toolchain (no zig — CI runners build their
# own arch natively, there is no cross-compilation). Builds all three
# binaries static-musl with linkage verification. NO publish side
# effects. Delete once the musl release path is confirmed green.

on:
  push:
    branches: [docs/polish-en-zh]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  PORTUNUS_SKIP_WEBUI: "1"

jobs:
  musl-build:
    name: musl build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    container:
      image: rust:1.88-bookworm
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    env:
      # aws-lc-sys (tonic TLS) compiles C with cmake; point it at musl-gcc
      # so its objects match the static-musl target ABI.
      CC_x86_64_unknown_linux_musl: musl-gcc
      CC_aarch64_unknown_linux_musl: musl-gcc
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            protobuf-compiler ca-certificates musl-tools musl-dev cmake
          rm -rf /var/lib/apt/lists/*

      - name: Install Rust target
        shell: bash
        run: rustup target add "${{ matrix.target }}"

      - name: cargo build --release (native static musl)
        shell: bash
        run: cargo build --release -p portunus-server -p portunus-client -p portunus-standalone --target "${{ matrix.target }}"

      - name: Verify static linkage
        shell: bash
        run: |
          set -euo pipefail
          for b in portunus-server portunus-client portunus-standalone; do
            f="target/${{ matrix.target }}/release/${b}"
            echo "== ${b} =="
            file "${f}" || true
            ldd "${f}" 2>&1 || true
          done
