name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  metadata:
    name: release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      image_namespace: ${{ steps.version.outputs.image_namespace }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 - <<'PY'
          import pathlib
          import tomllib

          cargo = tomllib.loads(pathlib.Path("Cargo.toml").read_text())
          print(cargo["workspace"]["package"]["version"])
          PY
          )"
          tag_name="v${version}"
          image_namespace="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" != "${tag_name}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${version}; expected ${tag_name}." >&2
            exit 1
          fi

          {
            echo "version=${version}"
            echo "tag_name=${tag_name}"
            echo "image_namespace=${image_namespace}"
          } >> "${GITHUB_OUTPUT}"

      - name: Extract release notes from CHANGELOG.md
        shell: bash
        run: |
          set -euo pipefail
          python3 - "${{ steps.version.outputs.version }}" <<'PY'
          import pathlib
          import re
          import sys

          version = sys.argv[1]
          changelog = pathlib.Path("CHANGELOG.md").read_text()
          heading = re.compile(rf"^## \[{re.escape(version)}\].*$", re.MULTILINE)
          match = heading.search(changelog)
          if match is None:
              raise SystemExit(f"CHANGELOG.md has no section for version {version}")

          next_heading = re.search(r"^## \[", changelog[match.end():], re.MULTILINE)
          end = match.end() + next_heading.start() if next_heading else len(changelog)
          notes = changelog[match.end():end].strip()
          if not notes:
              raise SystemExit(f"CHANGELOG.md section for version {version} is empty")

          pathlib.Path("release-notes.md").write_text(notes + "\n")
          PY

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 1

  webui:
    name: webui build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm build
        run: pnpm build

      - name: Upload webui/dist
        uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: webui/dist
          retention-days: 1

  build-linux:
    name: build linux (${{ matrix.target }})
    needs: [metadata, webui]
    runs-on: ${{ matrix.os }}
    container:
      image: rust:1.88-bookworm
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends protobuf-compiler ca-certificates
          rm -rf /var/lib/apt/lists/*

      - name: Install Rust target
        shell: bash
        run: rustup target add "${{ matrix.target }}"

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Download webui/dist
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui/dist

      - name: cargo build --release
        shell: bash
        run: cargo build --release -p portunus-server -p portunus-client -p portunus-standalone --target "${{ matrix.target }}"

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.metadata.outputs.version }}"
          target="${{ matrix.target }}"
          archive_base="portunus-${version}-${target}"
          staging="dist/${archive_base}"

          mkdir -p "${staging}"
          cp "target/${target}/release/portunus-server" "${staging}/"
          cp "target/${target}/release/portunus-client" "${staging}/"
          cp "target/${target}/release/portunus-standalone" "${staging}/"
          cp README.md CHANGELOG.md LICENSE-APACHE LICENSE-MIT "${staging}/"
          (cd dist && tar -czf "${archive_base}.tar.gz" "${archive_base}")

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/portunus-${{ needs.metadata.outputs.version }}-${{ matrix.target }}.tar.gz
          retention-days: 1

  build-macos:
    name: build macos (${{ matrix.target }})
    needs: [metadata, webui]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - name: Install Rust target
        shell: bash
        run: rustup target add "${{ matrix.target }}"

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Download webui/dist
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui/dist

      - name: cargo build --release
        shell: bash
        run: cargo build --release -p portunus-server -p portunus-client -p portunus-standalone --target "${{ matrix.target }}"

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.metadata.outputs.version }}"
          target="${{ matrix.target }}"
          archive_base="portunus-${version}-${target}"
          staging="dist/${archive_base}"

          mkdir -p "${staging}"
          cp "target/${target}/release/portunus-server" "${staging}/"
          cp "target/${target}/release/portunus-client" "${staging}/"
          cp "target/${target}/release/portunus-standalone" "${staging}/"
          cp README.md CHANGELOG.md LICENSE-APACHE LICENSE-MIT "${staging}/"
          (cd dist && tar -czf "${archive_base}.tar.gz" "${archive_base}")

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/portunus-${{ needs.metadata.outputs.version }}-${{ matrix.target }}.tar.gz
          retention-days: 1

  docker:
    name: docker images
    needs: [metadata, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux release archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*-unknown-linux-gnu
          path: dist
          merge-multiple: true

      - name: Prepare Docker build context
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.metadata.outputs.version }}"
          while read -r target arch
          do
            archive="dist/portunus-${version}-${target}.tar.gz"
            extracted="$(mktemp -d)"

            tar -xzf "${archive}" -C "${extracted}"
            mkdir -p "docker-bin/${arch}"
            cp "${extracted}/portunus-${version}-${target}/portunus-server" "docker-bin/${arch}/"
            cp "${extracted}/portunus-${version}-${target}/portunus-client" "docker-bin/${arch}/"
            cp "${extracted}/portunus-${version}-${target}/portunus-standalone" "docker-bin/${arch}/"
            chmod 0755 \
              "docker-bin/${arch}/portunus-server" \
              "docker-bin/${arch}/portunus-client" \
              "docker-bin/${arch}/portunus-standalone"
          done <<'EOF'
          x86_64-unknown-linux-gnu amd64
          aarch64-unknown-linux-gnu arm64
          EOF

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ needs.metadata.outputs.image_namespace }}/portunus-server:${{ needs.metadata.outputs.version }}
            ghcr.io/${{ needs.metadata.outputs.image_namespace }}/portunus-server:latest
          labels: |
            org.opencontainers.image.title=Portunus server
            org.opencontainers.image.description=Portunus control-plane server
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}

      - name: Build and push client image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile.client
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ needs.metadata.outputs.image_namespace }}/portunus-client:${{ needs.metadata.outputs.version }}
            ghcr.io/${{ needs.metadata.outputs.image_namespace }}/portunus-client:latest
          labels: |
            org.opencontainers.image.title=Portunus client
            org.opencontainers.image.description=Portunus edge forwarding client
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}

      - name: Build and push standalone image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile.standalone
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ needs.metadata.outputs.image_namespace }}/portunus-standalone:${{ needs.metadata.outputs.version }}
            ghcr.io/${{ needs.metadata.outputs.image_namespace }}/portunus-standalone:latest
          labels: |
            org.opencontainers.image.title=Portunus standalone
            org.opencontainers.image.description=Portunus TOML-driven control-plane-free forwarder
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}

  publish:
    name: publish GitHub release
    needs: [metadata, build-linux, build-macos, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 portunus-* > "portunus-${{ needs.metadata.outputs.version }}-checksums.txt"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag_name="${{ needs.metadata.outputs.tag_name }}"
          version="${{ needs.metadata.outputs.version }}"
          release_args=(
            "${tag_name}"
            --title "Portunus ${version}"
            --notes-file dist/release-notes.md
            --target "${GITHUB_SHA}"
            --latest
          )

          if [[ "${version}" == *-* ]]; then
            release_args+=(--prerelease)
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            release_args+=(--verify-tag)
          fi

          gh release create "${release_args[@]}" dist/portunus-*
