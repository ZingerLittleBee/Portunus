name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  webui:
    name: webui (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm lint
        run: pnpm lint

      - name: pnpm test (Vitest)
        run: pnpm test

      - name: pnpm build (size-limit gate)
        run: pnpm build

      - name: Upload webui/dist
        uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: webui/dist
          retention-days: 1

  installer:
    name: install.sh (shellcheck + dash/bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dash + shellcheck
        run: sudo apt-get update && sudo apt-get install -y dash shellcheck

      - name: Parse under dash and bash
        run: |
          dash -n scripts/install.sh
          bash -n scripts/install.sh

      - name: shellcheck (POSIX sh dialect)
        run: shellcheck -s sh scripts/install.sh

      - name: install.test.sh under bash
        run: bash scripts/install.test.sh

      - name: install.test.sh under dash
        run: TEST_SH=dash bash scripts/install.test.sh

  test:
    name: cargo test (${{ matrix.os }})
    needs: webui
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain (1.88, MSRV)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Download webui/dist
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui/dist

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace --all-targets

  e2e:
    name: Playwright e2e
    needs: webui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Download webui/dist
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui/dist

      - name: cargo build --release -p portunus-server -p portunus-client
        run: cargo build --release -p portunus-server -p portunus-client

      - name: pnpm install
        working-directory: webui
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: webui
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright test
        working-directory: webui
        env:
          PORTUNUS_SERVER_BIN: ${{ github.workspace }}/target/release/portunus-server
          PORTUNUS_CLIENT_BIN: ${{ github.workspace }}/target/release/portunus-client
        run: pnpm exec playwright test
