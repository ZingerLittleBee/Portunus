name: bench

# Runs the criterion data-plane benchmark and fails if median performance
# regressed >25% versus the committed baseline. Triggered on:
#  - PRs that touch hot-path code or the bench harness itself
#  - manual `workflow_dispatch` from the Actions UI
#
# Note: bench numbers are CI-runner-dependent. The baseline in
# `crates/portunus-forwarder/benches/baselines/v0.1.0.json` was captured on
# the maintainer's macOS dev box; we run the gate on macos-latest to
# keep noise *roughly* comparable, but GH-Actions runners are slower
# and noisier than dev hardware — particularly on the 1-byte RTT
# bench, which is dominated by scheduler jitter. The gate threshold
# is therefore set to 50%: tight enough to catch a real 2-3x
# regression (the spec-relevant signal), loose enough not to flake on
# every PR. Update the baseline with `cargo bench -- --save-baseline
# v0.1.0` and regenerate the JSON when an intentional perf change
# lands.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "crates/portunus-forwarder/src/**"
      - "crates/portunus-forwarder/benches/**"
      - "crates/portunus-forwarder/Cargo.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/bench_regression_gate.py"
      - ".github/workflows/bench.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  bench:
    name: criterion regression gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - uses: Swatinem/rust-cache@v2

      - name: cargo bench
        run: cargo bench -p portunus-forwarder --bench data_plane

      - name: regression gate
        run: python3 scripts/bench_regression_gate.py --max-regression-pct 50
